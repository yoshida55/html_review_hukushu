<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>getBoundingClientRect().top の仕組み</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>

<svg width="680" height="440" xmlns="http://www.w3.org/2000/svg">

  <!-- 背景 -->
  <rect width="680" height="440" fill="#fafafa" rx="12"/>
  <text x="340" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">getBoundingClientRect().top の仕組み</text>

  <!-- ===== パネル1 ===== -->
  <!-- ページ全体（グレー背景） -->
  <rect x="30" y="60" width="160" height="340" fill="#e8e8e8" rx="6" stroke="#ccc" stroke-width="1"/>
  <text x="110" y="78" text-anchor="middle" font-size="10" fill="#999">ページ全体</text>

  <!-- ビューポート（画面） -->
  <rect x="30" y="60" width="160" height="200" fill="white" rx="6" stroke="#4a90e2" stroke-width="3"/>
  <text x="110" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90e2">画面（viewport）</text>

  <!-- windowHeight の矢印 -->
  <line x1="202" y1="60" x2="202" y2="260" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="210" y="165" font-size="10" fill="#4a90e2">window</text>
  <text x="210" y="177" font-size="10" fill="#4a90e2">Height</text>
  <text x="210" y="189" font-size="10" fill="#4a90e2">= 1000px</text>
  <line x1="202" y1="60" x2="206" y2="65" stroke="#4a90e2" stroke-width="1.5"/>
  <line x1="202" y1="60" x2="198" y2="65" stroke="#4a90e2" stroke-width="1.5"/>
  <line x1="202" y1="260" x2="206" y2="255" stroke="#4a90e2" stroke-width="1.5"/>
  <line x1="202" y1="260" x2="198" y2="255" stroke="#4a90e2" stroke-width="1.5"/>

  <!-- ターゲット要素（画面外：下） -->
  <rect x="55" y="350" width="110" height="30" fill="#ff7043" rx="4"/>
  <text x="110" y="370" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ターゲット要素</text>

  <!-- top の矢印（画面上端→要素） -->
  <line x1="38" y1="60" x2="38" y2="350" stroke="#e53935" stroke-width="2"/>
  <line x1="38" y1="350" x2="33" y2="342" stroke="#e53935" stroke-width="2"/>
  <line x1="38" y1="350" x2="43" y2="342" stroke="#e53935" stroke-width="2"/>
  <text x="8" y="210" font-size="11" fill="#e53935" font-weight="bold">top</text>
  <text x="4" y="222" font-size="9" fill="#e53935">= 6000</text>

  <!-- 判定 -->
  <rect x="30" y="400" width="160" height="28" fill="#ffebee" rx="5"/>
  <text x="110" y="419" text-anchor="middle" font-size="12" fill="#e53935">6000 &lt; 1000 ❌ 画面外</text>

  <!-- タイトル -->
  <text x="110" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">① スクロール前</text>


  <!-- ===== パネル2 ===== -->
  <!-- ページ全体 -->
  <rect x="250" y="60" width="160" height="340" fill="#e8e8e8" rx="6" stroke="#ccc" stroke-width="1"/>
  <text x="330" y="78" text-anchor="middle" font-size="10" fill="#999">ページ全体</text>

  <!-- ビューポート -->
  <rect x="250" y="60" width="160" height="200" fill="white" rx="6" stroke="#4a90e2" stroke-width="3"/>
  <text x="330" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90e2">画面（viewport）</text>

  <!-- 画面下端の点線 -->
  <line x1="250" y1="260" x2="410" y2="260" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="416" y="264" font-size="9" fill="#4a90e2">下端</text>

  <!-- ターゲット要素（画面下端のすぐ下） -->
  <rect x="275" y="265" width="110" height="30" fill="#ff7043" rx="4"/>
  <text x="330" y="285" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ターゲット要素</text>

  <!-- top の矢印 -->
  <line x1="258" y1="60" x2="258" y2="265" stroke="#e53935" stroke-width="2"/>
  <line x1="258" y1="265" x2="253" y2="257" stroke="#e53935" stroke-width="2"/>
  <line x1="258" y1="265" x2="263" y2="257" stroke="#e53935" stroke-width="2"/>
  <text x="228" y="165" font-size="11" fill="#e53935" font-weight="bold">top</text>
  <text x="224" y="177" font-size="9" fill="#e53935">= 1000</text>

  <!-- 判定 -->
  <rect x="250" y="400" width="160" height="28" fill="#fff3e0" rx="5"/>
  <text x="330" y="419" text-anchor="middle" font-size="12" fill="#f57c00">1000 &lt; 1000 ❌ ギリギリ外</text>

  <!-- タイトル -->
  <text x="330" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">② スクロール中</text>


  <!-- ===== パネル3 ===== -->
  <!-- ページ全体 -->
  <rect x="470" y="60" width="160" height="340" fill="#e8e8e8" rx="6" stroke="#ccc" stroke-width="1"/>

  <!-- ビューポート -->
  <rect x="470" y="60" width="160" height="200" fill="white" rx="6" stroke="#4a90e2" stroke-width="3"/>
  <text x="550" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90e2">画面（viewport）</text>

  <!-- 画面下端の点線 -->
  <line x1="470" y1="260" x2="630" y2="260" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="636" y="264" font-size="9" fill="#4a90e2">下端</text>

  <!-- ターゲット要素（画面の中！） -->
  <rect x="495" y="210" width="110" height="30" fill="#43a047" rx="4"/>
  <text x="550" y="230" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ターゲット要素</text>

  <!-- top の矢印 -->
  <line x1="478" y1="60" x2="478" y2="210" stroke="#e53935" stroke-width="2"/>
  <line x1="478" y1="210" x2="473" y2="202" stroke="#e53935" stroke-width="2"/>
  <line x1="478" y1="210" x2="483" y2="202" stroke="#e53935" stroke-width="2"/>
  <text x="448" y="138" font-size="11" fill="#e53935" font-weight="bold">top</text>
  <text x="444" y="150" font-size="9" fill="#e53935">= 500</text>

  <!-- 判定 -->
  <rect x="470" y="400" width="160" height="28" fill="#e8f5e9" rx="5"/>
  <text x="550" y="419" text-anchor="middle" font-size="12" fill="#2e7d32">500 &lt; 1000 ✅ 画面に入った！</text>

  <!-- タイトル -->
  <text x="550" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">③ もう少しスクロール</text>


  <!-- 下部まとめ -->
  <rect x="30" y="435" width="620" height="0" fill="none"/>

</svg>

</body>
</html>
